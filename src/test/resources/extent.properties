# 1. Change this to just the top-level folder name
basefolder.name=test-output
# 2. Leave this BLANK to prevent the "SparkReport 2-Mar-26..." nested folders
basefolder.datetimepattern=

# 3. Set the specific output path for the Spark report
extent.reporter.spark.start=true
extent.reporter.spark.out=SparkReport/Index.html

# 4. Keep these for your screenshot functionality
screenshot.dir=test-output/Screenshots/
screenshot.rel.path=../Screenshots/

# 5. Comment this out unless you have actually created a spark-config.xml file
# extent.reporter.spark.config=src/test/resources/spark-config.xml