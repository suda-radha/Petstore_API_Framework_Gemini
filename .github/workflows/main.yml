name: Petstore API and UI Automation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Automation Tests- Junit Runner
      # We use -Dtest to specify your runner and -Dcucumber.filter.tags to focus
      run: mvn clean test -Dtest=com.petstore.Runner -Dcucumber.filter.tags="@regression"

    - name: Run Automation Tests-TestNG.xml
      run: mvn clean test -DsuiteXmlFile=testng.xml -Dcucumber.filter.tags="@regression" -Denv=int

    - name: Upload Cucumber Report
      if: always() # Upload reports even if tests fail
      uses: actions/upload-artifact@v4
      with:
        name: cucumber-html-report
        path: target/cucumber-reports.html
    
    - name: Upload Extent Spark Report
      if: always() # This ensures the report uploads even if a test fails
      uses: actions/upload-artifact@v4
      with:
        name: Extent-Spark-Report
        path: SparkReport/
        retention-days: 30

    - name: Upload Test Results-Videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Full-Test-Execution-Report-With Videos for Failed Tests
        path: |
          SparkReport/
          test-output/Videos/
        retention-days: 30

   - name: Send Email Notification
      if: always() # Ensure email is sent even if tests fail
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Test Execution Report - Petstore API Framework"
        to: subaar2018@gmail.com
        from: Gemini Automation -Suda Test Automation Results
        body: |
          The latest automation run for Petstore_API_Framework_Gemini has completed.
          
          Build Status: ${{ job.status }}
          Environment: INT
          
          You can download the full Spark Report and Execution Videos from the GitHub Actions artifacts section.
        attachments: SparkReport/Index.html